<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#2a2030"/>
      <stop offset="0.55" stop-color="#15121b"/>
      <stop offset="1" stop-color="#0b0a0d"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.55">
      <stop offset="0" stop-color="#d4a574" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c094"/>
      <stop offset="1" stop-color="#a07d4f"/>
    </linearGradient>
  </defs>

  <!-- background, rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- soft warm glow (no hard edge) -->
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- italic serif "e" centred — nudged left to compensate for italic visual lean -->
  <text x="240" y="338"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="320"
        font-style="italic"
        font-weight="400"
        fill="url(#accent)"
        text-anchor="middle"
        letter-spacing="-8">e</text>

  <!-- cue line beneath the glyph — single music-staff line -->
  <line x1="170" y1="378" x2="310" y2="378"
        stroke="#6bc3d6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- two note dots: gold (acoustic) + cyan (digital) -->
  <circle cx="190" cy="378" r="5" fill="#d4a574"/>
  <circle cx="290" cy="378" r="5" fill="#6bc3d6"/>
</svg>
